name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    uses: SamuelMarks/c-ci/.github/workflows/c-cmake-ci.yml@master
    with:
      cmake_configure_flags: "-DC_ABSTRACT_HTTP_ENABLE_WEBSOCKETS=ON -DC_ABSTRACT_HTTP_ENABLE_SSE=ON"
